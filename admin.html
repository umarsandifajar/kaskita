<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KasKita Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-3xl mx-auto p-6">
<div class="flex items-center justify-between mb-6">
<h1 class="text-3xl font-bold">🔒 KasKita Admin</h1>
<a id="waBtn" href="#" target="_blank" class="hidden inline-flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full shadow transition">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.52 3.48A11.82 11.82 0 0012.02 0C5.39 0 0 5.39 0 12.02c0 2.12.56 4.2 1.63 6.03L0 24l6.13-1.6a12 12 0 005.89 1.5h.01C18.61 23.9 24 18.51 24 11.98c0-3.2-1.25-6.2-3.48-8.5zM12.03 21.8a9.8 9.8 0 01-5-1.37l-.36-.21-3.64.95.97-3.55-.24-.37a9.76 9.76 0 118.27 4.55zm5.64-7.33c-.31-.15-1.82-.9-2.1-1-.28-.1-.48-.15-.69.16-.2.31-.79 1- .97 1.2.18.2.36.23.67.08.31-.15 1.3-.48 2.48-1.52.92-.82 1.54-1.84 1.72-2.15.18-.31.02-.48-.13-.64-.14-.14-.31-.36-.46-.54-.15-.18-.2-.31-.31-.51-.1-.2-.05-.38.03-.54.08-.15.69-1.66.95-2.27.25-.6.5-.5.69-.51h.59c.2 0 .51.08.77.38.26.31 1 1 .97 2.41-.03 1.41-.92 2.77-1.05 2.95-.13.18-1.8 2.75-4.36 3.85-.61.26-1.08.41-1.45.53-.61.19-1.16.16-1.6.1-.49-.07-1.51-.62-1.73-1.22-.22-.59-.22-1.1-.15-1.22.08-.13.28-.2.38-.31.1-.1.2-.23.31-.36.1-.13.13-.2.2-.33.08-.13.03-.26-.03-.38-.08-.13-.69-1.66-.95-2.27-.25-.6-.51-.52-.69-.53h-.59c-.2 0-.51.08-.77.38-.26.31-1 1-.97 2.41.03 1.41 1 2.77 1.13 2.95.13.18 1.94 2.97 4.7 4.17.66.28 1.18.45 1.58.57.67.21 1.28.18 1.76.11.54-.08 1.67-.68 1.91-1.34.23-.66.23-1.22.16-1.34-.08-.11-.28-.18-.59-.33z"/></svg>
Hubungi Bendahara</a></div>

<div id="loginCard" class="bg-white rounded-xl shadow p-6"><label class="block mb-2 font-semibold">PIN Admin</label><input id="pin" type="password" class="border w-full p-3 rounded-lg mb-4"><button onclick="login()" class="bg-blue-600 text-white px-4 py-3 rounded-lg w-full">Masuk</button><p id="msg" class="text-red-600 mt-3"></p></div>
<div id="app" class="hidden"><div class="bg-blue-600 text-white rounded-xl p-6 mt-6"><div>Saldo Kas</div><div id="saldo" class="text-4xl font-bold">Rp0</div></div>
<div class="bg-white rounded-xl shadow p-5 mt-6"><h2 class="font-bold text-xl mb-4">📢 Reminder</h2><textarea id="message" class="border w-full p-3 rounded mb-3" rows="3"></textarea><button onclick="saveMessage()" class="bg-purple-600 text-white w-full p-3 rounded">Update Informasi</button></div>
<div class="grid md:grid-cols-2 gap-6 mt-6"><div class="bg-white rounded-xl shadow p-5"><h2 class="font-bold text-xl mb-4">➕ Pemasukan</h2><input id="nama" class="border w-full p-2 rounded mb-2" placeholder="Nama Wali"><input id="nominalMasuk" type="number" class="border w-full p-2 rounded mb-2" placeholder="Nominal"><input id="ketMasuk" class="border w-full p-2 rounded mb-4" placeholder="Keterangan"><button onclick="tambahMasuk()" class="bg-green-600 text-white w-full p-3 rounded">Simpan</button></div>
<div class="bg-white rounded-xl shadow p-5"><h2 class="font-bold text-xl mb-4">➖ Pengeluaran</h2><input id="keperluan" class="border w-full p-2 rounded mb-2" placeholder="Keperluan"><input id="nominalKeluar" type="number" class="border w-full p-2 rounded mb-4" placeholder="Nominal"><button onclick="tambahKeluar()" class="bg-red-600 text-white w-full p-3 rounded">Simpan</button></div></div></div></div>
<script>
const API="https://script.google.com/macros/s/AKfycbwxFyfYQXmeM1_bOWGZkHKqwLLUv57qZdGEpetG85MzdI9C43rN_vwpm_POxqQH5YiOHQ/exec";
let PIN="";
const rupiah=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n);
async function login(){PIN=pin.value;const r=await fetch(API,{method:"POST",body:JSON.stringify({action:"login",pin:PIN})});const d=await r.json();if(!d.success){msg.innerText="PIN salah";return;}loginCard.classList.add("hidden");app.classList.remove("hidden");loadSaldo();}
async function loadSaldo(){const d=await (await fetch(API)).json();saldo.innerText=rupiah(d.saldo);message.value=d.message||"";if(d.adminWa){waBtn.href=`https://wa.me/${d.adminWa}`;waBtn.classList.remove("hidden");}}
async function send(body){const d=await (await fetch(API,{method:"POST",body:JSON.stringify(body)})).json();alert(d.message||(d.success?"Berhasil":"Gagal"));if(d.success)loadSaldo();}
function tambahMasuk(){send({action:"tambahMasuk",pin:PIN,tanggal:new Date().toISOString().slice(0,10),nama:nama.value,nominal:nominalMasuk.value,keterangan:ketMasuk.value});}
function tambahKeluar(){send({action:"tambahKeluar",pin:PIN,tanggal:new Date().toISOString().slice(0,10),nominal:nominalKeluar.value,keperluan:keperluan.value});}
function saveMessage(){send({action:"saveMessage",pin:PIN,message:message.value});}
</script></body></html>
