<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Laporan Kas Kelas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        @media print {

            .no-print{
                display:none;
            }

            body{
                background:white;
            }

            .shadow{
                box-shadow:none;
            }

        }

    </style>

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-8">

        <div>

            <h1 class="text-3xl font-bold">
                Laporan Kas Kelas
            </h1>

            <p class="text-gray-500 mt-1">
                Dicetak :
                <span id="tanggalCetak"></span>
            </p>

        </div>

        <button
            onclick="window.print()"
            class="no-print bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl">

            🖨 Cetak / Simpan PDF

        </button>

    </div>

    <!-- SUMMARY -->

    <div class="bg-white rounded-2xl shadow p-6 mb-8">

        <h2 class="text-xl font-bold mb-5">

            Ringkasan

        </h2>

        <div class="grid md:grid-cols-3 gap-5">

            <div class="border rounded-xl p-5">

                <div class="text-gray-500">

                    Total Pemasukan

                </div>

                <div
                    id="totalMasuk"
                    class="text-2xl font-bold text-green-600 mt-2">

                </div>

            </div>

            <div class="border rounded-xl p-5">

                <div class="text-gray-500">

                    Total Pengeluaran

                </div>

                <div
                    id="totalKeluar"
                    class="text-2xl font-bold text-red-600 mt-2">

                </div>

            </div>

            <div class="border rounded-xl p-5">

                <div class="text-gray-500">

                    Saldo

                </div>

                <div
                    id="saldo"
                    class="text-2xl font-bold text-blue-600 mt-2">

                </div>

            </div>

        </div>

    </div>

    <!-- PEMASUKAN -->

    <div class="bg-white rounded-2xl shadow p-6 mb-8">

        <h2 class="text-xl font-bold mb-5">

            Detail Pemasukan

        </h2>

        <table class="w-full border">

            <thead class="bg-gray-100">

                <tr>

                    <th class="border p-2">No</th>
                    <th class="border p-2">Tanggal</th>
                    <th class="border p-2">Nama</th>
                    <th class="border p-2">Keterangan</th>
                    <th class="border p-2 text-right">Nominal</th>

                </tr>

            </thead>

            <tbody id="tbodyPemasukan">

            </tbody>

        </table>

    </div>

    <!-- PENGELUARAN -->

    <div class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-xl font-bold mb-5">

            Detail Pengeluaran

        </h2>

        <table class="w-full border">

            <thead class="bg-gray-100">

                <tr>

                    <th class="border p-2">No</th>
                    <th class="border p-2">Tanggal</th>
                    <th class="border p-2">Keperluan</th>
                    <th class="border p-2 text-right">Nominal</th>

                </tr>

            </thead>

            <tbody id="tbodyPengeluaran">

            </tbody>

        </table>

    </div>

</div>

<script src="js/laporan.js"></script>

</body>
</html>
